{% extends 'base.html' %}
{% load static %}

{% block body %}

<h3>Loja</h3>
    {% for produto in produtos %}

        <div class="produto">
            <a href="{% url 'ver_produto' produto.id %}">
                <img src="{{ produto.imagem.url }}" alt="{{ produto.nome }}" width="200" height="200">
            </a>
            <h4>{{ produto.nome }}</h4>
            <p>Preço: R$ {{ produto.preco }}</p>

        </div>
    {% endfor %}

{% endblock %}
