{% extends 'base.html' %}
{% load static %}

{% block body %}

<h3>Criar conta</h3>
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <input type="text" name="email" placeholder="Username" required />
    <input type="password" name="senha" placeholder="Passenhasword" required />
    <input type="password" name="confirmacaosenha" placeholder="confirmacaosenha" required />    
    <button type="submit">Login</button>
</form>
<a href="{% url 'fazer_login' %}">Já tem uma conta? Faça login</a>
<a href="#">Esqueci minha senha</a>
{% endblock %}
