{% extends 'base.html' %}
{% load static %}

{% block body %}

<h3>HomePage</h3>
{% for banner in banners %}
    <div class="banner">
        <a href="/{{ banner.link_destino }}">
            <img src="{{ banner.imagem.url }}" alt="{{ banner.titulo }}" width="400" height="400">
        </a>
    </div>
{% endfor %}

{% endblock %}
